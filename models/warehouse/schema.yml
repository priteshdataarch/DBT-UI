  # Composite primary key: mursionsessionid + skill_id + event_number
  - name: f_live_skills
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - mursionsessionid
            - skill_id
            - event_number
    columns:
      - name: mursionsessionid
        tests:
          - not_null
      - name: skill_id
        tests:
          - not_null
      - name: event_number
        tests:
          - not_null

  - name: d_post_simulation
    columns:
      - name: mursionsessionid
        tests:
          - unique
          - not_null

  # Composite primary key: op + session_id + user_role_id + score
  - name: m_session_learner  

    tests:
    - dbt_utils.unique_combination_of_columns:
        name: unique_session_user
        arguments:
        combination_of_columns:
          - session_id
          - user_role_id

    columns:
    - name: session_id
      tests:
        - not_null

    - name: user_role_id
      tests:
        - not_null

    - name: has_d_value
      tests:
        - not_null
        - accepted_values:
            arguments:
              values: [0]

  # Composite primary key: scenario_id + team_id
  - name: m_scenario_team
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - scenario_id
            - team_id
    columns:
      - name: scenario_id
        tests:
          - not_null
      - name: team_id
        tests:
          - not_null

  # Composite primary key: sessionid + skill + rn
  - name: f_ondemand_skills
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - sessionid
            - skill
            - rn
    columns:
      - name: sessionid
        tests:
          - not_null
      - name: skill
        tests:
          - not_null
      - name: rn
        tests:
          - not_null

  - name: f_skill_domain_mapping
    columns:
