name: Run dbt (seed + run)

on:
  # Scheduled trigger — uncomment to re-enable
  # schedule:
  #   - cron: '0 6 * * *'   # daily at 06:00 UTC
  # Manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-dbt:
    name: Pull image and execute dbt seed + dbt run
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull latest dbt image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mursion-dbt-athena
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Run dbt seed and dbt run
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mursion-dbt-athena
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=us-west-2 \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            sh -c "dbt seed && dbt run"
